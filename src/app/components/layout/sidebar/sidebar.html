<aside class="sidebar glass-panel">
  <div class="logo-container">
    <h2 class="brand-font">Ali <span class="text-gold">Studio</span></h2>
  </div>

  <nav class="nav-section">
    <ul class="nav-list">
      @for (item of menuItems; track item.label) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
            <lucide-icon [img]="item.icon" [size]="20" class="icon"></lucide-icon>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="nav-bottom">
    <ul class="nav-list">
      @for (item of bottomItems; track item.label) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active" class="nav-link">
            <lucide-icon [img]="item.icon" [size]="20" class="icon"></lucide-icon>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
      <li>
        <button class="nav-link logout-btn">
          <lucide-icon [img]="LogOut" [size]="20" class="icon"></lucide-icon>
          <span>Salir</span>
        </button>
      </li>
    </ul>
  </div>
</aside>
