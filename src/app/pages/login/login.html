<div class="login-container pink-gradient">
  <div class="login-card glass-panel">
    <div class="login-header">
      <h1 class="brand-font">Ali <span class="text-gold">Studio</span></h1>
      <p>Bienvenida de nuevo</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          placeholder="tu@email.com"
          class="glass-input"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="••••••••"
          class="glass-input"
        />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading || !loginForm.valid" class="btn-primary login-btn">
        {{ loading ? 'Iniciando sesión...' : 'Entrar' }}
      </button>
    </form>

    <div class="login-footer">
      <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
